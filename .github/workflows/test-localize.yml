# 跨平台沙盒测试工作流
# 自动在 Linux、macOS、Windows 三个环境测试汉化脚本
# 触发条件：push 到 main 分支，或手动触发

name: 🧪 跨平台沙盒测试

on:
  push:
    branches: [main, master]
    paths:
      - 'localize/**'
      - '.github/workflows/test-localize.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许手动触发

jobs:
  # ==================== Linux 测试 ====================
  test-linux:
    name: 🐧 Linux 测试
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 检查 Bash 脚本语法
        run: |
          echo "=== Linux 环境沙盒测试 ==="
          bash -n localize/localize.sh
          bash -n localize/restore.sh
          echo "✅ Bash 脚本语法正确"

      - name: 🧪 沙盒模拟汉化测试
        run: |
          # 创建沙盒环境
          SANDBOX_DIR="/tmp/claude-sandbox-$$"
          mkdir -p "$SANDBOX_DIR"

          # 创建模拟的 cli.js 文件
          cat > "$SANDBOX_DIR/cli.js" << 'EOF'
          const config = {
            title: "Welcome back!",
            usage: "Usage",
            status: "Status",
            cancel: "Esc to cancel"
          };
          EOF

          echo "📄 沙盒文件已创建"
          cat "$SANDBOX_DIR/cli.js"

          # 执行汉化逻辑
          count=0
          while IFS='|' read -r keyword translation || [ -n "$keyword" ]; do
            [ -z "$keyword" ] && continue
            [[ "$keyword" =~ ^[[:space:]]*# ]] && continue

            keyword=$(echo "$keyword" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            translation=$(echo "$translation" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$keyword" ] && continue

            escaped_key=$(echo "$keyword" | sed 's/[\/&]/\\&/g')

            if grep -q "\"${keyword}\"" "$SANDBOX_DIR/cli.js" 2>/dev/null; then
              sed -i "s/\"${escaped_key}\"/\"${translation}\"/g" "$SANDBOX_DIR/cli.js"
              count=$((count + 1))
              echo "  ✅ $keyword → $translation"
            fi
          done < localize/keyword.conf

          echo ""
          echo "📊 Linux 沙盒测试: 成功替换 $count 个词条"
          echo "📄 汉化后内容:"
          cat "$SANDBOX_DIR/cli.js"

          # 清理沙盒
          rm -rf "$SANDBOX_DIR"
          echo "🧹 沙盒已清理"

  # ==================== macOS 测试 ====================
  test-macos:
    name: 🍎 macOS 测试
    runs-on: macos-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 检查 Bash 脚本语法
        run: |
          echo "=== macOS 环境沙盒测试 ==="
          bash -n localize/localize.sh
          bash -n localize/restore.sh
          echo "✅ Bash 脚本语法正确"

      - name: 🧪 沙盒模拟汉化测试
        run: |
          # 创建沙盒环境
          SANDBOX_DIR="/tmp/claude-sandbox-$$"
          mkdir -p "$SANDBOX_DIR"

          # 创建模拟的 cli.js 文件
          cat > "$SANDBOX_DIR/cli.js" << 'EOF'
          const config = {
            title: "Welcome back!",
            usage: "Usage",
            status: "Status",
            cancel: "Esc to cancel"
          };
          EOF

          echo "📄 沙盒文件已创建"
          cat "$SANDBOX_DIR/cli.js"

          # 执行汉化逻辑
          count=0
          while IFS='|' read -r keyword translation || [ -n "$keyword" ]; do
            [ -z "$keyword" ] && continue
            [[ "$keyword" =~ ^[[:space:]]*# ]] && continue

            keyword=$(echo "$keyword" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            translation=$(echo "$translation" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            [ -z "$keyword" ] && continue

            escaped_key=$(echo "$keyword" | sed 's/[\/&]/\\&/g')

            if grep -q "\"${keyword}\"" "$SANDBOX_DIR/cli.js" 2>/dev/null; then
              # macOS 的 sed 需要 -i 后面加空字符串
              sed -i '' "s/\"${escaped_key}\"/\"${translation}\"/g" "$SANDBOX_DIR/cli.js"
              count=$((count + 1))
              echo "  ✅ $keyword → $translation"
            fi
          done < localize/keyword.conf

          echo ""
          echo "📊 macOS 沙盒测试: 成功替换 $count 个词条"
          echo "📄 汉化后内容:"
          cat "$SANDBOX_DIR/cli.js"

          # 清理沙盒
          rm -rf "$SANDBOX_DIR"
          echo "🧹 沙盒已清理"

  # ==================== Windows 测试 ====================
  test-windows:
    name: 🪟 Windows 测试
    runs-on: windows-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🔍 检查 PowerShell 脚本语法
        shell: pwsh
        run: |
          Write-Host "=== Windows 环境沙盒测试 ===" -ForegroundColor Cyan

          # 检查 PowerShell 脚本语法
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content "localize/localize.ps1" -Raw), [ref]$null)
          Write-Host "✅ localize.ps1 语法正确" -ForegroundColor Green

          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content "localize/restore.ps1" -Raw), [ref]$null)
          Write-Host "✅ restore.ps1 语法正确" -ForegroundColor Green

      - name: 🧪 沙盒模拟汉化测试
        shell: pwsh
        run: |
          # 创建沙盒环境
          $sandboxDir = Join-Path $env:TEMP "claude-sandbox-$(Get-Random)"
          New-Item -ItemType Directory -Path $sandboxDir -Force | Out-Null

          # 创建模拟的 cli.js 文件
          $cliContent = @'
          const config = {
            title: "Welcome back!",
            usage: "Usage",
            status: "Status",
            cancel: "Esc to cancel"
          };
          '@

          $cliPath = Join-Path $sandboxDir "cli.js"
          $cliContent | Set-Content $cliPath -Encoding UTF8

          Write-Host "📄 沙盒文件已创建" -ForegroundColor Cyan
          Get-Content $cliPath

          # 读取关键词配置并执行替换
          $keywordFile = "localize/keyword.conf"
          $content = Get-Content $cliPath -Raw -Encoding UTF8
          $count = 0

          Get-Content $keywordFile -Encoding UTF8 | ForEach-Object {
            if ($_ -and -not $_.StartsWith("#") -and $_.Contains("|")) {
              $parts = $_.Split("|")
              if ($parts.Length -ge 2) {
                $keyword = $parts[0].Trim()
                $translation = $parts[1].Trim()

                if ($keyword -and $content -match "`"$([regex]::Escape($keyword))`"") {
                  $content = $content -replace "`"$([regex]::Escape($keyword))`"", "`"$translation`""
                  $count++
                  Write-Host "  ✅ $keyword → $translation" -ForegroundColor Green
                }
              }
            }
          }

          # 保存汉化后的文件
          $content | Set-Content $cliPath -Encoding UTF8 -NoNewline

          Write-Host ""
          Write-Host "📊 Windows 沙盒测试: 成功替换 $count 个词条" -ForegroundColor Cyan
          Write-Host "📄 汉化后内容:" -ForegroundColor Cyan
          Get-Content $cliPath

          # 清理沙盒
          Remove-Item $sandboxDir -Recurse -Force
          Write-Host "🧹 沙盒已清理" -ForegroundColor Yellow

  # ==================== 测试报告 ====================
  test-report:
    name: 📋 测试报告
    needs: [test-linux, test-macos, test-windows]
    runs-on: ubuntu-latest

    steps:
      - name: 📊 生成测试报告
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║          🎉 跨平台沙盒测试全部通过！                  ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  🐧 Linux   ✅ 通过                                  ║"
          echo "║  🍎 macOS   ✅ 通过                                  ║"
          echo "║  🪟 Windows ✅ 通过                                  ║"
          echo "╚══════════════════════════════════════════════════════╝"
          echo ""
          echo "📅 测试时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "🔗 查看详情: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
